name: Build and Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  "Build and Test":
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test

  merge-gate:
    name: merge-gate
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "merge-gate green"
          else
            echo "merge-gate red (build=${{ needs.build.result }})"
            exit 1
          fi
